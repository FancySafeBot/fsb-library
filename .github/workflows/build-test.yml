name: Build and Test

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: release

jobs:

  prep:
    runs-on: ubuntu-latest
    outputs:
      repo_lower: ${{ steps.repo.outputs.repo_lower }}
    steps:
      - id: repo
        run: |
          echo "repo_lower=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

  build-devcontainer:
    needs: prep
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      packages: write
    outputs:
      image: ghcr.io/${{ needs.prep.outputs.repo_lower }}/devcontainer:${{ github.sha }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Github Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Container to Registry
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ needs.prep.outputs.repo_lower }}/devcontainer:stable
            ghcr.io/${{ needs.prep.outputs.repo_lower }}/devcontainer:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build:
    needs: build-devcontainer
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container:
      image: ${{ needs.build-devcontainer.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake --preset "${{env.BUILD_TYPE}}"

      - name: Build
        run: cmake --build --preset "${{env.BUILD_TYPE}}"

  test:
    needs: build-devcontainer
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container:
      image: ${{ needs.build-devcontainer.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Test
        # Execute tests defined by the CMake configuration.
        run: |
          cmake --workflow --preset test

  analyze:
    needs: build-devcontainer
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container:
      image: ${{ needs.build-devcontainer.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake --preset "${{env.BUILD_TYPE}}"

      - name: Build
        run: cmake --build --preset "${{env.BUILD_TYPE}}"

      - name: Analyze
        run: ./scripts/clang-tidy-fix.sh --no-fix
